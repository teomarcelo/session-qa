# Publishes `dist/` from `npm run build` to GitHub Pages.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify Vite emitted bundled assets (not /src/ dev paths)
        run: |
          test -f dist/student.html
          grep -q './assets/' dist/student.html || { echo 'dist/student.html must reference ./assets/ — build output looks wrong'; exit 1; }
          if grep -qF '/src/student/main.js' dist/student.html; then
            echo 'dist/student.html still points at /src/student/main.js — Vite did not transform the entry HTML'
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
